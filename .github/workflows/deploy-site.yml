name: Reusable site deploy

on:
  workflow_call:
    inputs:
      deploy_host:
        required: false
        type: string
        default: "167.235.54.105"
      deploy_port:
        required: false
        type: string
        default: "22"
      deploy_user:
        required: false
        type: string
        default: "root"
      deploy_path:
        required: true
        type: string
      deploy_source:
        required: false
        type: string
        default: ""
      checkout_sparse:
        required: false
        type: string
        default: ""
      node_version:
        required: false
        type: string
        default: ""
      setup_command:
        required: false
        type: string
        default: ""
      install_command:
        required: false
        type: string
        default: ""
      build_command:
        required: false
        type: string
        default: ""
      rsync_excludes:
        required: false
        type: string
        default: ""
    secrets:
      deploy_ssh_key:
        required: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_source: ${{ steps.resolve.outputs.deploy_source }}
      site_hostname: ${{ steps.resolve.outputs.site_hostname }}
      manage_nginx: ${{ steps.resolve.outputs.manage_nginx }}
      cert_name: ${{ steps.resolve.outputs.cert_name }}
    steps:
      - name: Check out repository
        if: ${{ inputs.checkout_sparse == '' }}
        uses: actions/checkout@v4

      - name: Check out repository (sparse)
        if: ${{ inputs.checkout_sparse != '' }}
        uses: actions/checkout@v4
        with:
          sparse-checkout: ${{ inputs.checkout_sparse }}
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        if: ${{ inputs.node_version != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run setup command
        if: ${{ inputs.setup_command != '' }}
        run: ${{ inputs.setup_command }}

      - name: Run install command
        if: ${{ inputs.install_command != '' }}
        run: ${{ inputs.install_command }}

      - name: Run build command
        if: ${{ inputs.build_command != '' }}
        run: ${{ inputs.build_command }}

      - name: Resolve deploy layout
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_PATH="${{ inputs.deploy_path }}"
          DEPLOY_SOURCE="${{ inputs.deploy_source }}"
          DEPLOY_USER="${{ inputs.deploy_user }}"
          SITE_HOSTNAME="$(basename "$DEPLOY_PATH")"
          SITE_SLUG="${SITE_HOSTNAME%%.*}"
          CERT_NAME="$(awk -F. '{ if (NF >= 2) print $(NF-1) "." $NF; else print $0 }' <<<"$SITE_HOSTNAME")"
          MANAGE_NGINX="false"

          if [ -z "$DEPLOY_SOURCE" ]; then
            if [ -d "$SITE_SLUG" ]; then
              DEPLOY_SOURCE="$SITE_SLUG"
            else
              DEPLOY_SOURCE="."
            fi
          fi

          if [[ "$DEPLOY_PATH" == /var/www/* ]] && [[ "$SITE_HOSTNAME" == *.* ]] && [[ "$DEPLOY_USER" == "root" ]]; then
            MANAGE_NGINX="true"
          fi

          echo "Resolved deploy source: $DEPLOY_SOURCE"
          echo "Resolved site hostname: $SITE_HOSTNAME"
          echo "Manage nginx site: $MANAGE_NGINX"

          echo "deploy_source=$DEPLOY_SOURCE" >> "$GITHUB_OUTPUT"
          echo "site_hostname=$SITE_HOSTNAME" >> "$GITHUB_OUTPUT"
          echo "manage_nginx=$MANAGE_NGINX" >> "$GITHUB_OUTPUT"
          echo "cert_name=$CERT_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate deploy source
        run: |
          if [ ! -d "${{ steps.resolve.outputs.deploy_source }}" ]; then
            echo "Deploy source directory '${{ steps.resolve.outputs.deploy_source }}' does not exist." >&2
            exit 1
          fi

      - name: Stage deploy files
        run: |
          STAGE_DIR="$RUNNER_TEMP/site"
          mkdir -p "$STAGE_DIR"

          EXCLUDE_ARGS=(
            "--exclude=.git/"
            "--exclude=.github/"
          )

          while IFS= read -r pattern; do
            if [ -n "$pattern" ]; then
              EXCLUDE_ARGS+=("--exclude=$pattern")
            fi
          done <<'EOF'
          ${{ inputs.rsync_excludes }}
          EOF

          rsync -a \
            "${EXCLUDE_ARGS[@]}" \
            "${{ steps.resolve.outputs.deploy_source }}/" \
            "$STAGE_DIR/"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ${{ runner.temp }}/site

  deploy-server:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ${{ runner.temp }}/site

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.deploy_ssh_key }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ inputs.deploy_port }}" -H "${{ inputs.deploy_host }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          ssh -p "${{ inputs.deploy_port }}" \
            "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}" \
            "mkdir -p '${{ inputs.deploy_path }}'"

          rsync -az --delete \
            -e "ssh -p ${{ inputs.deploy_port }}" \
            "${{ runner.temp }}/site/" \
            "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}:${{ inputs.deploy_path }}/"

      - name: Ensure nginx site
        if: ${{ needs.prepare.outputs.manage_nginx == 'true' }}
        run: |
          ssh -p "${{ inputs.deploy_port }}" "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}" \
            "SITE_HOSTNAME='${{ needs.prepare.outputs.site_hostname }}' DEPLOY_PATH='${{ inputs.deploy_path }}' CERT_NAME='${{ needs.prepare.outputs.cert_name }}' bash -s" <<'EOF'
          set -euo pipefail

          CONFIG_PATH="/etc/nginx/sites-available/$SITE_HOSTNAME"
          LINK_PATH="/etc/nginx/sites-enabled/$SITE_HOSTNAME"
          MANAGED_MARKER="# Managed by OpenAEC shared deploy workflow"

          if [ -f "$CONFIG_PATH" ] && ! grep -Fq "$MANAGED_MARKER" "$CONFIG_PATH"; then
            echo "Nginx config exists and is unmanaged, leaving it unchanged: $CONFIG_PATH"
            exit 0
          fi

          printf '%s\n' \
            "$MANAGED_MARKER" \
            "server {" \
            "    listen 80;" \
            "    listen [::]:80;" \
            "    server_name $SITE_HOSTNAME;" \
            "    return 301 https://\$host\$request_uri;" \
            "}" \
            "" \
            "server {" \
            "    listen 443 ssl http2;" \
            "    listen [::]:443 ssl http2;" \
            "    server_name $SITE_HOSTNAME;" \
            "" \
            "    root $DEPLOY_PATH;" \
            "    index index.html;" \
            "" \
            "    ssl_certificate /etc/letsencrypt/live/$CERT_NAME/fullchain.pem;" \
            "    ssl_certificate_key /etc/letsencrypt/live/$CERT_NAME/privkey.pem;" \
            "" \
            "    location / {" \
            "        try_files \$uri \$uri/ /index.html;" \
            "    }" \
            "}" \
            > "$CONFIG_PATH"

          ln -sfn "$CONFIG_PATH" "$LINK_PATH"
          nginx -t
          systemctl reload nginx
          EOF
